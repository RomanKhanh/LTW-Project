<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thành công</title>
    <link rel="stylesheet" href="/CSS/alertsuccess.css">
</head>
<body>
    <div class="wrap">
        <header class="header">
            <div class="brand">
                <div class="logo">🎬</div>
                <div>
                    <h1>KGV</h1>
                    <p class="subtitle">Thanh toán thành công</p>
                </div>
            </div>
        </header>

        <main class="main">
            <section class="card">
                <div class="success-container">

                    <div class="success-icon">✓</div>
                    <h2 class="success-message">Thanh toán thành công!</h2>
                    <p class="submessage">Chúc bạn có một buổi xem phim tuyệt vời!</p>

                    <div class="infor-details">

                        <div class="detail-row">
                            <p class="label">Phim</p>
                            <p class="value">-</p>
                        </div>

                        <div class="detail-row">
                            <p class="label">Thời gian, Rạp</p>
                            <p class="value">-</p>
                        </div>

                        <div class="detail-row">
                            <p class="label">Ghế</p>
                            <p class="value">-</p>
                        </div>

                        <div class="detail-row">
                            <p class="label">Giá vé</p>
                            <p class="value">-</p>
                        </div>
                        
                    </div>
                    <div class="alert success-alert">
                        <p>Hóa đơn đã được gửi qua email của bạn</p>
                    </div>
                    <button class="btn backhome">Quay về trang chủ</button>
                </div>
            </section>
        </main>

        <footer class="footer">© Cinema — Contact support@cinema.example</footer>

    </div>
</body>
</html>
