<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/CSS/GiaoDien.css" />
    <title>Đăng ký</title>
  </head>

  <body>
    <h1 class="rap-title">RẠP PHIM ...</h1>

    <div class="box">
      <h1>Đăng ký</h1>

      <form id="registerForm">
        <input type="text" id="regName" placeholder="Tên người dùng" />
        <span class="error" id="errRegName"></span>

        <input type="tel" id="regPhone" placeholder="Số điện thoại" />
        <span class="error" id="errRegPhone"></span>

        <input type="password" id="regPass" placeholder="Mật khẩu" />
        <span class="error" id="errRegPass"></span>

        <button type="submit">Đăng ký</button>
      </form>
    </div>

    <script src="/javascript/DangKy.js"></script>
  </body>
</html>
