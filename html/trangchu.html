<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Chiếu Phim Hiện Đại</title>

    <!-- Kết nối CSS -->
    <link rel="stylesheet" href="../CSS/trangchu.css">
</head>

<body>

    <h1>🎬 Phim Đang Chiếu Tại Rạp 🎬</h1>

    <div class="movie-grid">

        <div class="movie-card">
            <img src="https://via.placeholder.com/300x450?text=Hanh+Dong" alt="">
            <div class="movie-info">
                <h3>Chiến Binh Cuối Cùng</h3>
                <p class="price">85.000 VNĐ</p>
                <button class="btn-booking">Đặt Vé</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://via.placeholder.com/300x450?text=Hoat+Hinh" alt="">
            <div class="movie-info">
                <h3>Thế Giới Phép Thuật</h3>
                <p class="price">75.000 VNĐ</p>
                <button class="btn-booking">Đặt Vé</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://via.placeholder.com/300x450?text=Kinh+Di" alt="">
            <div class="movie-info">
                <h3>Tiếng Gọi Đêm Khuya</h3>
                <p class="price">90.000 VNĐ</p>
                <button class="btn-booking">Đặt Vé</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://via.placeholder.com/300x450?text=Hai" alt="">
            <div class="movie-info">
                <h3>Siêu Quậy Học Đường</h3>
                <p class="price">70.000 VNĐ</p>
                <button class="btn-booking">Đặt Vé</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://via.placeholder.com/300x450?text=Vien+Tuong" alt="">
            <div class="movie-info">
                <h3>Hành Tinh Song Song</h3>
                <p class="price">95.000 VNĐ</p>
                <button class="btn-booking">Đặt Vé</button>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://via.placeholder.com/300x450?text=Tinh+Cam" alt="">
            <div class="movie-info">
                <h3>Hẹn Ước Mùa Thu</h3>
                <p class="price">80.000 VNĐ</p>
                <button class="btn-booking">Đặt Vé</button>
            </div>
        </div>

    </div>

    <!-- Kết nối JS -->
    <script src="../javascript/trangchu.js"></script>

</body>
</html>
