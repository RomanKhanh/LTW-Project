<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đặt vé xem phim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/showtime.css">
</head>
<body>

<div class="container">
  <div class="layout">

    <div>
      <div class="movie-poster">
        <img src="https://upload.wikimedia.org/wikipedia/en/7/7f/Kung_Fu_Panda_4_poster.jpg">
      </div>
      <div class="movie-detail">
        <h1>Tên phim: </h1>
        <p>THể loại: </p>
        <p>Thời lượng: phút</p>
        <span class="movie-tag">Phù hợp mọi lứa tuổi</span>
      </div>
    </div>

    <div>

      <h2>Khu vực</h2>
      <div class="option-group">
        <label><input type="radio" name="area" value="Cần Thơ" checked> Cần Thơ</label>
        <label><input type="radio" name="area" value="TP. Hồ Chí Minh"> TP. Hồ Chí Minh</label>
        <label><input type="radio" name="area" value="Hà Nội"> Hà Nội</label>
      </div>

      <div class="cinema-list" id="cinemaList"></div>

      <h2>Ngày</h2>
      <div class="date-list">
        <button class="date active" data-date="10/03/2026">10/03</button>
        <button class="date" data-date="11/03/2026">11/03</button>
        <button class="date" data-date="12/03/2026">12/03</button>
      </div>

      <h2>Giờ</h2>
      <div class="showtime-list" id="showtimeList"></div>

      <div class="confirm-box" id="confirmBox">
        <p id="cfArea"></p>
        <p id="cfCinema"></p>
        <p id="cfDate"></p>
        <p id="cfTime"></p>
      </div>

      <button class="btn-next" id="nextBtn" disabled>Tiếp tục chọn ghế</button>

    </div>
  </div>
</div>

<script src="../javascript/showtime.js"></script>
</body>
</html>
