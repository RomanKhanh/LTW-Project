<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../file CSS/GiaoDien.css" />
    <title>Web phim</title>
  </head>
  <body>
    <!--tên rap-->
    <h1 class="rap-title">RẠP PHIM ...</h1>

    <div class="box">
      <h1>Đăng nhập</h1>

      <form id="loginForm">
        <input type="text" id="loginName" placeholder="Tên người dùng" />
        <span class="error" id="errName"></span>

        <input type="tel" id="loginPhone" placeholder="Số điện thoại" />
        <span class="error" id="errPhone"></span>

        <input type="password" id="loginPass" placeholder="Mật khẩu" />
        <span class="error" id="errPass"></span>

        <p class="error" id="loginError"></p>

        <button type="submit">Đăng nhập</button>
      </form>

      <p>
        Chưa có tài khoản?
        <a href="Đăng ký.html">Đăng ký</a>
      </p>
    </div>

    <script src="login.js"></script>
  </body>
</html>
